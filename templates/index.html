<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background-color: #1e293b; padding: 2.5rem; border-radius: 12px; text-align: center; border: 1px solid #334155; max-width: 420px; width: 100%; }
        h1 { color: #38bdf8; margin-top: 0; }
        .ip-box { font-size: 1.6rem; font-family: monospace; background-color: #020617; padding: 1rem; border-radius: 8px; color: #4ade80; margin: 1.5rem 0; word-break: break-all; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        .detail { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; }
        .detail .k { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 3px; }
        .detail .v { font-size: 0.88rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome, User</h1>
        <p>Your network identity has been detected.</p>
        <div class="ip-box">{{ ip_address }}</div>
        <div class="detail-grid">
            <div class="detail"><div class="k">Country</div><div class="v">{{ geo.country }}</div></div>
            <div class="detail"><div class="k">City</div><div class="v">{{ geo.city }}</div></div>
            <div class="detail"><div class="k">Browser</div><div class="v">{{ browser }}</div></div>
            <div class="detail"><div class="k">OS</div><div class="v">{{ os_name }}</div></div>
            <div class="detail"><div class="k">Device</div><div class="v">{{ device }}</div></div>
            <div class="detail"><div class="k">ISP</div><div class="v" style="font-size:0.75rem;">{{ geo.isp }}</div></div>
        </div>
    </div>
</body>
</html>
